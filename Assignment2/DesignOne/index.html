<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insects | Assignment 2.1</title>
    
    <!-- Ultra-fast alternate CDN for system icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" />
    
    <!-- Fast-load editorial layout Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <!-- LEFT HALF CONTAINER -->
        <div id="left">
            <div class="nav-left">    
                <span class="logo">INSECT</span>
                <div class="search-container">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </div>

            <h1 class="vertical-title">Classification</h1>

            <div class="taxonomy-list">
                <div class="tax-item">
                    <p class="bullet class-dot">Class:</p>
                    <span>Insecta</span>
                </div>
                <div class="tax-item">
                    <p class="bullet order-dot">Order:</p>
                    <span>Coleoptera</span>
                </div>
                <div class="tax-item">
                    <p class="bullet family-dot">Family:</p>
                    <span>Cerambycidae</span>
                </div>
                <div class="tax-item">
                    <p class="bullet subfamily-dot">Sub-Family:</p>
                    <span>Cerambycinae</span>
                </div>
                <div class="tax-item">
                    <p class="bullet tribe-dot">Tribe:</p>
                    <span>Callicromatini</span>
                </div>
                <div class="tax-item">
                    <p class="bullet genus-dot">Genus:</p>
                    <span>Pachyteria</span>
                </div>
            </div>
        </div>

        <!-- CENTER FLOATING BUG SPECIMEN -->
        <div class="center-glass-jar">
            <img src="assets/jar.png" alt="Insect Specimen">
        </div>

        <!-- RIGHT HALF CONTAINER -->
        <div id="right">
            <div class="nav-right">    
                <h4>Home</h4>
                <h4>Shop</h4>
                <h4>About</h4>
                <h4>Gallery</h4>
                <h4>Contact</h4>
            </div>

            <div class="specimen-content">
                <h1 class="insect-name">Pachyteria<br>equestris</h1>

                <div class="specs-grid">
                    <div class="bug-vector">
                        <i class="ri-bug-line"></i>
                        <p>32 mm</p>
                    </div>
                    <div class="metadata">
                        <div class="meta-item">
                            <i class="ri-map-pin-2-fill"></i>
                            <div>
                                <label>Locality:</label>
                                <p>Malaysia</p>
                            </div>
                        </div>
                        <div class="meta-item">
                            <i class="ri-genderless-line"></i>
                            <div>
                                <label>Sex:</label>
                                <p>Male</p>
                            </div>
                        </div>
                        <div class="meta-item">
                            <i class="ri-ruler-2-line"></i>
                            <div>
                                <label>Size:</label>
                                <p>32 mm / 12 mm</p>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="price">$5.99</h2>

                <div class="toggles-group">
                    <div class="toggle-row">
                        <span class="toggle-pill"></span>
                        <p>View detailed antennae</p>
                    </div>
                    <div class="toggle-row">
                        <span class="toggle-pill"></span>
                        <p>View underside</p>
                    </div>
                </div>

                <button class="add-collection-btn">Add to collection</button>
            </div>
        </div>
    </main>

</body>
</html>
